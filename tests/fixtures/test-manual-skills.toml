# test-manual-skills.toml - Test configuration for manually managed skills
#
# This is a test configuration file that represents a project where skills are
# manually installed in the .kilocode/skills/ directory (not via switchboard.toml).
#
# This file is used to test backwards compatibility with legacy projects where:
# - Skills were manually placed in .kilocode/skills/ directory
# - No skills field is defined in switchboard.toml
# - The system should detect and use manually installed skills
#
# Configuration structure:
# - [settings] section: Optional global settings that apply to all agents
# - [[agent]] sections: One or more agent configurations (at least one required)
# NOTE: This file intentionally does NOT include the 'skills' field to test
# the legacy behavior where skills are managed manually in the filesystem.

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================

[settings]
image_name = "switchboard-agent"
image_tag = "latest"
log_dir = ".switchboard/logs"
timezone = "system"
overlap_mode = "skip"

# =============================================================================
# AGENT CONFIGURATIONS
# =============================================================================

# -----------------------------------------------------------------------------
# Agent 1: Manual skills test agent
# This agent relies on manually installed skills in .kilocode/skills/
# No skills field is specified - the system should look for skills in the
# .kilocode/skills/ directory
# -----------------------------------------------------------------------------

[[agent]]
name = "agent1"

# Required: Cron schedule for when this agent should run
schedule = "0 * * * *"

# Required: Either inline prompt text OR a prompt_file path (not both)
prompt = """
This agent tests backward compatibility with manually managed skills.
The system should detect skills from the .kilocode/skills/ directory.
"""
