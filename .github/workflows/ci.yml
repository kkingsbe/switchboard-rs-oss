name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run unit tests
        run: cargo nextest run

      - name: Install Docker
        uses: docker/setup-buildx-action@v3

      - name: Run integration tests
        run: cargo nextest run --features integration
        continue-on-error: true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate lcov coverage report
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Generate html coverage report
        run: cargo llvm-cov --html --output-dir coverage/

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            lcov.info
            coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Check coverage minimums
        run: |
          # Extract line coverage percentage
          LINE_COV=$(cargo llvm-cov --lcov --output-path - | grep -oP '^SF:.*|^LF:[0-9]+|^LH:[0-9]+' | awk '/^LF:/ {lf+=$2} /^LH:/ {lh+=$2} END {printf "%.0f", (lh/lf)*100}')
          # Extract branch coverage percentage  
          BRANCH_COV=$(cargo llvm-cov --lcov --output-path - | grep -oP '^BRF:[0-9]+|^BRH:[0-9]+' | awk '/^BRF:/ {brf+=$2} /^BRH:/ {brh+=$2} END {if(brf>0) printf "%.0f", (brh/brf)*100; else print "0"}')
          
          echo "Line Coverage: ${LINE_COV}% (required: 70%)"
          echo "Branch Coverage: ${BRANCH_COV}% (required: 60%)"
          
          if [ "$LINE_COV" -lt 70 ]; then
            echo "ERROR: Line coverage ${LINE_COV}% is below minimum 70%"
            exit 1
          fi
          
          if [ "$BRANCH_COV" -lt 60 ]; then
            echo "ERROR: Branch coverage ${BRANCH_COV}% is below minimum 60%"
            exit 1
          fi
          
          echo "Coverage minimums passed!"
