[settings]
image_name = "switchboard-agent"
image_tag = "latest"
log_dir = ".switchboard/logs"
timezone = "system"

[[agent]]
name = "sb-auditor"
schedule = "0 */2 * * *"              # Every 2 hours
readonly = false
timeout = "40m"
prompt_file = ".switchboard/prompts/workflows/codebase-maintinance/AUDITOR.md"
env = { AGENT_COUNT = "2" }

[[agent]]
name = "sb-improvement-planner"
schedule = "30 */2 * * *"             # 30 min after auditor
readonly = false
timeout = "30m"
prompt_file = ".switchboard/prompts/workflows/codebase-maintinance/IMPROVEMENT_PLANNER.md"
env = { AGENT_COUNT = "2" }

[[agent]]
name = "sb-refactor-1"
schedule = "*/45 * * * *"             # Every 45 min
readonly = false
timeout = "30m"
prompt_file = ".switchboard/prompts/workflows/codebase-maintinance/REFACTOR_DEV.md"
env = { AGENT_ID = "1" }

[[agent]]
name = "sb-refactor-2"
schedule = "*/45 * * * *"
readonly = false
timeout = "30m"
prompt_file = ".switchboard/prompts/workflows/codebase-maintinance/REFACTOR_DEV.md"
env = { AGENT_ID = "2" }

