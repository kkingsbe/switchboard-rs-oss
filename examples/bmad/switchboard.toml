[settings]
image_name = "switchboard-agent"
image_tag = "latest"
log_dir = ".switchboard/logs"
timezone = "system"

# ═══════════════════════════════════════════════════════════════════════
# BMAD IMPLEMENTATION WORKFLOW
# ═══════════════════════════════════════════════════════════════════════
#
# Flow: Architect → Dev Agents → Code Reviewer → Scrum Master
#
# Prerequisites: BMAD planning artifacts in _bmad-output/planning-artifacts/
#   - PRD.md, architecture.md, epics/, project-context.md
#
# Schedule rationale:
#   - SM runs hourly to detect sprint completion and update progress
#   - Architect runs every 2h to plan new sprints or rebalance
#   - Dev agents run every 30min to implement stories
#   - Reviewer runs every 45min to review completed work
#   - Staggered dev agent starts prevent git conflicts

[[agent]]
name = "sb-scrum-master"
schedule = "0 * * * *"                    # Every hour on the hour
readonly = false
timeout = "15m"
prompt_file = "prompts/SCRUM_MASTER.md"
env = { AGENT_COUNT = "2" }

[[agent]]
name = "sb-architect"
schedule = "15 */2 * * *"                 # Every 2 hours at minute 15
readonly = false
timeout = "30m"
prompt_file = "prompts/ARCHITECT.md"
env = { AGENT_COUNT = "2" }

[[agent]]
name = "sb-dev-1"
schedule = "*/30 * * * *"                 # Every 30 min (minute 0, 30)
readonly = false
timeout = "30m"
prompt_file = "prompts/DEV_PARALLEL.md"
env = { AGENT_ID = "1" }

[[agent]]
name = "sb-dev-2"
schedule = "10,40 * * * *"               # Every 30 min (minute 10, 40)
readonly = false
timeout = "30m"
prompt_file = "prompts/DEV_PARALLEL.md"
env = { AGENT_ID = "2" }

[[agent]]
name = "sb-code-reviewer"
schedule = "20 */1 * * *"                 # Every hour at minute 20
readonly = false
timeout = "20m"
prompt_file = "prompts/CODE_REVIEWER.md"